# yaml-language-server: $schema=./hazelcast-config-5.6.json

# Hazelcast Standalone Configuration
#
# Note: JDBC persistence with MapStore should be configured programmatically 
# in Java code, not in YAML, to avoid schema validation issues in Hazelcast OSS 5.6.
#
# See HazelcastInstanceFactory.java for programmatic MapStore configuration.
# Tables are created via Liquibase migrations (see HazelcastDatabaseMigrator.java)
#
hazelcast:
  cluster-name: standalone-crawler

  data-connection:
    h2:
      type: JDBC
      properties:
        jdbcUrl: jdbc:h2:file:./data/crawler_db
        username: sa
        password: ""
        maximumPoolSize: 10
      shared: true  
  
  jet:
    enabled: true
    #resource-upload-enabled: false
    #flow-control-period: 100
    #backup-count: 1
    #scale-up-delay-millis: 10000
    #lossless-restart-enabled: false
    #max-processor-accumulated-records: 9223372036854776000
      
  network:
    port:
      # was: 5701
      port: 0
      auto-increment: true
    join:
      multicast:
        enabled: false
      tcp-ip:
        enabled: false

  # Map configurations
  map:
    default:
      backup-count: 0
      map-store:
        enabled: false

    CRAWLER:
      backup-count: 0
      map-store:
        enabled: true
        initial-mode: EAGER
        write-delay-seconds: 0
        class-name: com.norconex.crawler.core.cluster.impl.hazelcast.SimpleJdbcMapStore
        properties:
          jdbcUrl: jdbc:h2:file:./data/crawler_db
          username: sa
          password: ""
          tableName: CRAWLER
          keyColumn: map_key
          valueColumn: map_value

