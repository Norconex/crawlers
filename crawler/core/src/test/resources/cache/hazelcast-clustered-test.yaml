# yaml-language-server: $schema=https://raw.githubusercontent.com/hazelcast/hazelcast/v5.6.0/hazelcast/src/main/resources/hazelcast-config-5.6.json
# Test-only Hazelcast Cluster Configuration
#
# This is intentionally tuned for fast startup on CI/Windows:
# - Fewer partitions -> fewer migration tasks on cluster formation
# - LAZY map-store loading to avoid long startup times in stop/resume tests
# - Explicit ledger_* value type to keep server-side predicates queryable
#
hazelcast:
  cluster-name: crawler-cluster

  properties:
    hazelcast.partition.count: 17
    # Fast failure detection for crash tests: declare a dead member within ~10s
    # rather than the default 60s. This allows the coordinator to see a crashed
    # node as EXPIRED and reduce the pipeline status to COMPLETED quickly.
    hazelcast.heartbeat.interval.seconds: 1
    hazelcast.max.no.heartbeat.seconds: 10

  data-connection:
    jdbc-datasource:
      type: JDBC
      properties:
        jdbcUrl: ${JDBC_URL}
        username: ${JDBC_USERNAME}
        password: ${JDBC_PASSWORD}
        driverClassName: ${JDBC_DRIVER}
        maximumPoolSize: 20
      shared: true  
  
  jet:
    enabled: true
    backup-count: 1
      
  network:
    port:
      port: 5701
      auto-increment: true
      port-count: 100
    join:
      multicast:
        enabled: false
        multicast-group: 224.2.2.3
        multicast-port: 54327
        multicast-time-to-live: 32
        multicast-timeout-seconds: 2
        trusted-interfaces:
          - 127.0.0.*
          - 192.168.*.*
      
      tcp-ip:
        enabled: true
        member-list:
          # Match the configured port range (5701 + port-count=100).
          # On Windows/CI, ports may remain temporarily unavailable between
          # tests; auto-increment can then bind to a higher port.
          - 127.0.0.1:5701
          - 127.0.0.1:5702
          - 127.0.0.1:5703
          - 127.0.0.1:5704
          - 127.0.0.1:5705
