# Norconex Beam Crawler Configuration
name: Norconex Distributed Crawler
description: A scalable distributed crawler using Apache Beam
version: 1.0.0

# URLs to start crawling from
startUrls:
  - https://example.com
  - https://norconex.com
  - https://opensource.norconex.com

# URL patterns to include (regex)
includePatterns:
  - https://.*\.example\.com/.*
  - https://.*\.norconex\.com/.*

# URL patterns to exclude (regex)
excludePatterns:
  - .*\.(jpg|jpeg|png|gif|css|js|ico|svg)$
  - .*/login/.*
  - .*/logout/.*
  - .*/search\?.*

# Frontier configuration
frontier:
  storageType: memory
  queueCapacity: 1000000
  priorityLevels: 5
  enableDistributedState: true
  stateBackend: flink
  checkpointPath: /tmp/crawler-checkpoints

# Scheduler configuration
scheduler:
  maxConcurrentRequests: 100
  minDelayBetweenRequestsMs: 1000
  maxRequestsPerHost: 2
  maxRetries: 3
  retryDelayMs: 5000
  respectRobotsTxt: true
  politenessDelayMs: 500
  enableAdaptivePoliteness: true
  schedulerThreads: 10
  idleTimeoutMs: 60000

# Discovery configuration
discovery:
  maxDepth: 10
  includeExternal: false
  includeStaticResources: false
  respectNofollow: true
  includeFragments: false
  includeMediaFiles: false
  maximumUrlsPerPage: 1000
  parseJavaScript: false

# Deduplication configuration
deduplication:
  storageType: memory
  maxCapacity: 10000000
  enableDistributed: true
  distributedImplementation: redis
  redisHost: localhost
  redisPort: 6379
  redisPassword: ""
  enableContentFingerprinting: true
  fingerprintAlgorithm: murmur3_128
  recordMetadata: true

# Committer configuration
committer:
  type: solr
  endpoint: http://localhost:8983/solr/crawler
  batchSize: 100
  useNiFiIntegration: false
  useCamelIntegration: false

# Importer configuration
importer:
  extractEmbeddedResources: true
  parseContent: true
  transformerClasses:
    - com.norconex.importer.handler.transformer.impl.DOMTagger
    - com.norconex.importer.handler.transformer.impl.TitleExtractor