name: "DCO Enforcement"

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  verify-dco:
    name: "DCO Sign-off Check"
    runs-on: ubuntu-latest
    steps:
      - name: "DCO Check"
        uses: KineticCafe/actions-dco@v1
        with:
          # Exempt Dependabot, whose commits GitHub signs but does not sign off.
          exempt-authors: |
            49699333+dependabot[bot]@users.noreply.github.com
