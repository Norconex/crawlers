# Runs a weekly Maven dependency update report and prints the results to the
# workflow log so GitHub's normal workflow notification email can point back to
# the report output.

name: Dependency Update Report

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21 and Maven
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Show Maven version
        run: mvn --version

      - name: Print dependency update report
        run: |
          echo "Running Maven dependency update report..."
          mvn -B -ntp \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            versions:display-dependency-updates \
            versions:display-plugin-updates \
            versions:display-property-updates
