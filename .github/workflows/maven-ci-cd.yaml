# This workflow handles Maven CI, Sonar analysis, and release publishing
# for the crawler reactor. It builds and tests pull requests, runs Sonar
# on same-repo PRs and push builds, enforces quality gates only on pushes
# to main, publishes snapshots from main, publishes releases from
# release/* branches, and updates the GitHub dependency graph on
# deployment branches.

name: Maven CI/CD Workflow

on:
  push:
    branches:
      - main
      - release/*
    # Only run this workflow if one or more files were changed and not part of
    # 'paths-ignore'.
    paths-ignore:
      - ./V4_MIGRATION.md
      - "**/README.md"
      - "**/TODO.txt"
  pull_request:
    branches:
      - "*"
    types: [ opened, synchronize, reopened ]
    # Unfortunately GitHub actions does not yet support Yaml anchors and aliases
    # so we have to repeat the paths-ignore here.
    paths-ignore:
      - ./V4_MIGRATION.md
      - "**/README.md"
      - "**/TODO.txt"

jobs:
  build:
    runs-on: ubuntu-latest

    # Env. vars. defined here are available to all steps.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SHOULD_UPDATE_DEPENDENCY_GRAPH: ${{ github.repository == 'Norconex/crawlers' &&
        github.event_name == 'push' && (github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/heads/release/')) }}

    permissions:
      id-token: write
      # write is required for release tagging and dependency submission
      contents: write

    steps:

      #--- Step ------------------------------------------------------------------

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # depth 0 means checkout all commits... we need that
          # in case there are many commits in a push/PR
          fetch-depth: 0

      #--- Step ------------------------------------------------------------------
      - name: Get project version
        id: get_version
        run: |
          version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$version" >> $GITHUB_OUTPUT

      #--- Step ------------------------------------------------------------------

      - name: Merge main|release into PR branch
        if: >
          github.event_name == 'pull_request' && (
            github.event.pull_request.base.ref == 'main' ||
            startsWith(github.event.pull_request.base.ref, 'release/')
          )
        run: git merge --ff-only "origin/${{ github.event.pull_request.base.ref }}"

      #--- Step ------------------------------------------------------------------

      - name: Set up JDK 21 and Maven
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          # Value of the GPG private key to import
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          # Env variable name for GPG private key passphrase
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - run: mvn --version

      #--- Step ------------------------------------------------------------------

      - name: Cache SonarCloud packages
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      #--- Step ------------------------------------------------------------------

      # Resolving before other mvn commands will fail early if there is an issue.
      # Downloaded items won't be downloaded again in this workflow.
      # We use :go-offline instead of :resolve so it does not fail if our own
      # internal dependencies are not yet found on central.
      - name: Resolve Maven Dependencies
        run: |
          mvn dependency:go-offline -U \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      #--- Step ------------------------------------------------------------------

      # Build the full reactor in CI to keep cross-module behavior consistent.

      - name: Build and test (fork or bot PR)
        if: >
          github.event_name == 'pull_request' && (
            github.event.pull_request.head.repo.full_name != github.repository ||
            contains(github.actor, '[bot]')
          )
        run: |
          mvn clean install \
            -Dgpg.skip=true \
            -Dsonar.skip=true \
            -Dmaven.javadoc.skip=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -C \
            -B

      #--- Step ------------------------------------------------------------------

      - name: Build, test and analyze (same-repo PR)
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          !contains(github.actor, '[bot]')
        run: |
          mvn clean install \
            -Dmaven.compiler.maxmem=3072m \
            -DargLine="-Xmx3g" \
            -Dgpg.skip=true \
            -Dmaven.javadoc.skip=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -Pjacoco \
            -Dsonar.qualitygate.wait=false \
            -C \
            -B

      #--- Step ------------------------------------------------------------------

      - name: Build, publish and analyze snapshot (push to main)
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          endsWith(steps.get_version.outputs.version, '-SNAPSHOT')
        run: |
          mvn clean deploy \
            -Dgpg.skip=true \
            -Dmaven.javadoc.skip=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -Pjacoco \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=900 \
            -Dsurefire.excludedGroups= \
            -C \
            -B
        env:
          # Keep existing GitHub secret names; only the local env var names
          # reflect Central publishing.
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      #--- Step ------------------------------------------------------------------

      - name: Build, publish and analyze release (push to release/*)
        if: >
          github.event_name == 'push' && startsWith(github.ref,
          'refs/heads/release/') && !endsWith(steps.get_version.outputs.version,
          '-SNAPSHOT')
        run: |
          mvn clean deploy \
            -Dmaven.compiler.maxmem=3072m \
            -DargLine="-Xmx3g" \
            -Dmaven.javadoc.skip=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -Pjacoco \
            -Dsonar.qualitygate.wait=false \
            -C \
            -B
        env:
          # Keep existing GitHub secret names; only the local env var names
          # reflect Central publishing.
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      #--- Step ------------------------------------------------------------------

      - name: Build only (push version mismatch)
        if: >
          github.event_name == 'push' && (
            (github.ref == 'refs/heads/main' && !endsWith(steps.get_version.outputs.version, '-SNAPSHOT')) ||
            (startsWith(github.ref, 'refs/heads/release/') && endsWith(steps.get_version.outputs.version, '-SNAPSHOT'))
          )
        run: |
          echo "Branch/version mismatch detected; skipping deploy and running install only"
          mvn clean install \
            -Dmaven.compiler.maxmem=3072m \
            -DargLine="-Xmx3g" \
            -Dgpg.skip=true \
            -Dsonar.skip=true \
            -Dmaven.javadoc.skip=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -C \
            -B

      #--- Step ------------------------------------------------------------------
      - name: Tag release version
        if: |
          github.ref != 'refs/heads/main' &&
          startsWith(github.ref, 'refs/heads/release/') &&
          steps.get_version.outputs.version != '' &&
          !endsWith(steps.get_version.outputs.version, '-SNAPSHOT') &&
          success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      #--- Step ------------------------------------------------------------------

      # Uploads the full dependency graph to GitHub to improve the quality
      # of Dependabot alerts this repository can receive
      - name: Update Maven dependency graph
        if: ${{ env.SHOULD_UPDATE_DEPENDENCY_GRAPH == 'true' }}
        uses: advanced-security/maven-dependency-submission-action@v4
