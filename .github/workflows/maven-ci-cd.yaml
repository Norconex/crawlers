# This workflow handles Maven CI, Sonar analysis, and release publishing
# for the crawler reactor. It builds and tests pull requests, runs Sonar
# on same-repo PRs and push builds, enforces quality gates only on pushes
# to main, publishes snapshots from main, publishes releases from
# release/* branches, and updates the GitHub dependency graph on
# deployment branches.

name: Maven CI/CD Workflow

on:
  push:
    branches:
      - main
      - release/*
    # Only run this workflow if one or more files were changed and not part of
    # 'paths-ignore'.
    paths-ignore:
      - "V4_MIGRATION.md"
      - "**/README.md"
      - "**/TODO.txt"
      - "docs/**"
  pull_request:
    branches:
      - "*"
    types: [opened, synchronize, reopened]
    # Unfortunately GitHub actions does not yet support Yaml anchors and aliases
    # so we have to repeat the paths-ignore here.
    paths-ignore:
      - "V4_MIGRATION.md"
      - "**/README.md"
      - "**/TODO.txt"
      - "docs/**"

jobs:
  build:
    runs-on: ubuntu-latest

    # Env. vars. defined here are available to all steps.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    permissions:
      id-token: write
      # write is required for release tagging and dependency submission
      contents: write

    steps:
      #--- Step ------------------------------------------------------------------

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # depth 0 means checkout all commits... we need that
          # in case there are many commits in a push/PR
          fetch-depth: 0

      #--- Step ------------------------------------------------------------------

      - name: Merge main|release into PR branch
        if: >
          github.event_name == 'pull_request' && (
            github.event.pull_request.base.ref == 'main' ||
            startsWith(github.event.pull_request.base.ref, 'release/')
          )
        run: git merge --ff-only "origin/${{ github.event.pull_request.base.ref }}"

      #--- Step ------------------------------------------------------------------

      - name: Set up JDK 21 and Maven
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          # Value of the GPG private key to import
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          # Env variable name for GPG private key passphrase
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - run: mvn --version

      #--- Step ------------------------------------------------------------------

      # Runs after setup-java so it benefits from the JDK and Maven cache.
      # -N (non-recursive): only the root POM is needed for the version.
      - name: Get project version
        id: get_version
        run: |
          version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -N)
          echo "version=$version" >> $GITHUB_OUTPUT

      #--- Step ------------------------------------------------------------------

      - name: Cache SonarCloud packages
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      #--- Step ------------------------------------------------------------------

      # Build the full reactor in CI to keep cross-module behavior consistent.

      - name: Build and test (fork or bot PR)
        if: >
          github.event_name == 'pull_request' && (
            github.event.pull_request.head.repo.full_name != github.repository ||
            contains(github.actor, '[bot]')
          )
        run: |
          mvn clean install \
            -Dgpg.skip=true \
            -Dsonar.skip=true \
            -DskipITs=true \
            -Dmaven.javadoc.skip=true \
            -Dassembly.skipAssembly=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -C \
            -B

      #--- Step ------------------------------------------------------------------

      - name: Build and test (same-repo PR)
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          !contains(github.actor, '[bot]')
        run: |
          mvn clean install \
            -Dmaven.compiler.maxmem=3072m \
            -DargLine="-Xmx3g" \
            -Dgpg.skip=true \
            -DskipITs=true \
            -Dmaven.javadoc.skip=true \
            -Dassembly.skipAssembly=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -Pjacoco,parallel-tests \
            -C \
            -B
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.OSSRH_TOKEN }}

      #--- Step ------------------------------------------------------------------

      - name: Sonar analysis (PR — parallel, gate changed modules)
        if: >
          env.SONAR_TOKEN != '' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          !contains(github.actor, '[bot]')
        run: |
          mvn -N -q -Psonar-parallel initialize \
            -Dsonar.gate.mode=changed \
            "-Dsonar.base.sha=${{ github.event.pull_request.base.sha }}" \
            "-Dsonar.pullrequest.key=${{ github.event.number }}" \
            "-Dsonar.pullrequest.branch=${{ github.head_ref }}" \
            "-Dsonar.pullrequest.base=${{ github.base_ref }}"

      #--- Step ------------------------------------------------------------------

      - name: Build and publish snapshot (push to main)
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          endsWith(steps.get_version.outputs.version, '-SNAPSHOT')
        run: |
          mvn clean deploy \
            -Dgpg.skip=true \
            -DskipITs=true \
            -Dmaven.javadoc.skip=true \
            -Dassembly.skipAssembly=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -Pjacoco,parallel-tests \
            -C \
            -B
        env:
          # Keep existing GitHub secret names; only the local env var names
          # reflect Central publishing.
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      #--- Step ------------------------------------------------------------------

      # Download the latest successful nightly's JaCoCo exec files so we can
      # merge IT coverage into the unit-test-only exec files produced above.
      # Skipped silently on first run (no nightly artifact exists yet).
      - name: Download latest nightly IT exec coverage
        id: dl-nightly
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          endsWith(steps.get_version.outputs.version, '-SNAPSHOT')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_RUN=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow=nightly-tests.yaml \
            --status=success \
            --limit=1 \
            --json=databaseId \
            -q '.[0].databaseId' 2>/dev/null || echo "")

          if [ -n "$LATEST_RUN" ]; then
            gh run download "$LATEST_RUN" \
              --repo ${{ github.repository }} \
              --name jacoco-nightly-exec \
              --dir .nightly-exec 2>/dev/null \
              && echo "result=downloaded" >> $GITHUB_OUTPUT \
              || echo "result=skipped" >> $GITHUB_OUTPUT
          else
            echo "No successful nightly run found — skipping IT coverage merge"
            echo "result=skipped" >> $GITHUB_OUTPUT
          fi

      #--- Step ------------------------------------------------------------------

      # For each module that has both a CI unit-test exec and a nightly IT exec,
      # merge them using the JaCoCo CLI so Sonar sees combined coverage.
      # Then regenerate the XML reports that Sonar reads.
      - name: Merge nightly IT coverage into unit test reports
        if: steps.dl-nightly.outputs.result == 'downloaded'
        run: |
          JACOCO_VERSION=$(mvn help:evaluate \
            -Dexpression=jacoco-maven-plugin.version -q -DforceStdout -N)
          mvn dependency:copy \
            -Dartifact="org.jacoco:org.jacoco.cli:${JACOCO_VERSION}:jar:nodeps" \
            -DoutputDirectory=/tmp/jacoco-cli/ \
            -q -B
          JACOCO_CLI="/tmp/jacoco-cli/org.jacoco.cli-${JACOCO_VERSION}-nodeps.jar"

          MODULES=(
            importer
            crawler/core crawler/fs crawler/web
            committer/core committer/amazoncloudsearch committer/apachekafka
            committer/azurecognitivesearch committer/elasticsearch committer/idol
            committer/neo4j committer/solr committer/sql
          )
          for MODULE in "${MODULES[@]}"; do
            CI_EXEC="${MODULE}/target/jacoco.exec"
            NIGHTLY_EXEC=".nightly-exec/${MODULE}/target/jacoco.exec"
            if [ -f "$CI_EXEC" ] && [ -f "$NIGHTLY_EXEC" ]; then
              java -jar "$JACOCO_CLI" merge "$CI_EXEC" "$NIGHTLY_EXEC" \
                --destfile "$CI_EXEC"
              echo "[coverage] Merged IT data: $MODULE"
            fi
          done

          # Regenerate XML reports from the merged exec files so Sonar reads
          # combined UT+IT coverage instead of unit-test-only coverage.
          mvn jacoco:report \
            -Djacoco.formats=XML \
            -B -q \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      #--- Step ------------------------------------------------------------------

      - name: Sonar analysis (main push — parallel, gate changed modules)
        if: >
          env.SONAR_TOKEN != '' &&
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          endsWith(steps.get_version.outputs.version, '-SNAPSHOT')
        run: |
          mvn -N -q -Psonar-parallel initialize \
            -Dsonar.gate.mode=changed \
            -Dsonar.base.sha=${{ github.event.before }} \
            -Dsonar.qualitygate.timeout=300

      #--- Step ------------------------------------------------------------------

      - name: Build and publish release (push to release/*)
        if: >
          github.event_name == 'push' && startsWith(github.ref,
          'refs/heads/release/') && !endsWith(steps.get_version.outputs.version,
          '-SNAPSHOT')
        run: |
          mvn clean deploy \
            -Dmaven.compiler.maxmem=3072m \
            -DargLine="-Xmx3g" \
            -DskipITs=true \
            -Dmaven.javadoc.skip=true \
            -Dassembly.skipAssembly=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -Pjacoco \
            -C \
            -B
        env:
          # Keep existing GitHub secret names; only the local env var names
          # reflect Central publishing.
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      #--- Step ------------------------------------------------------------------

      # Release builds gate all modules — a release should be fully clean.
      - name: Sonar analysis (release — parallel, gate all modules)
        if: >
          env.SONAR_TOKEN != '' &&
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/heads/release/') &&
          !endsWith(steps.get_version.outputs.version, '-SNAPSHOT')
        run: |
          mvn -N -q -Psonar-parallel initialize \
            -Dsonar.gate.mode=all \
            -Dsonar.qualitygate.timeout=300

      #--- Step ------------------------------------------------------------------

      - name: Build only (push version mismatch)
        if: >
          github.event_name == 'push' && (
            (github.ref == 'refs/heads/main' && !endsWith(steps.get_version.outputs.version, '-SNAPSHOT')) ||
            (startsWith(github.ref, 'refs/heads/release/') && endsWith(steps.get_version.outputs.version, '-SNAPSHOT'))
          )
        run: |
          echo "Branch/version mismatch detected; skipping deploy and running install only"
          mvn clean install \
            -Dmaven.compiler.maxmem=3072m \
            -DargLine="-Xmx3g" \
            -Dgpg.skip=true \
            -Dsonar.skip=true \
            -DskipITs=true \
            -Dmaven.javadoc.skip=true \
            -Dassembly.skipAssembly=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -C \
            -B

      #--- Step ------------------------------------------------------------------
      - name: Tag release version
        if: |
          github.ref != 'refs/heads/main' &&
          startsWith(github.ref, 'refs/heads/release/') &&
          steps.get_version.outputs.version != '' &&
          !endsWith(steps.get_version.outputs.version, '-SNAPSHOT') &&
          success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      #--- Step ------------------------------------------------------------------

      #--- Step ------------------------------------------------------------------

      - name: Package distribution zips
        if: >
          success() && github.event_name == 'push' && (
            (github.ref == 'refs/heads/main' &&
              endsWith(steps.get_version.outputs.version, '-SNAPSHOT')) ||
            (startsWith(github.ref, 'refs/heads/release/') &&
              !endsWith(steps.get_version.outputs.version, '-SNAPSHOT'))
          )
        run: |
          # Full zips (default profile): reuses compiled output from main deploy
          mvn -pl crawler/web,crawler/fs \
            -Dmaven.compiler.skip=true \
            -Dmaven.test.skip=true \
            -Dmaven.javadoc.skip=true \
            -Dgpg.skip=true \
            -B \
            package
          # Standard zips: Maven resolver applies transitive exclusions
          # declared in each module's standard profile — no recompile needed.
          mvn -pl crawler/web -Pstandard \
            -Dmaven.compiler.skip=true \
            -Dmaven.test.skip=true \
            -Dmaven.javadoc.skip=true \
            -Dgpg.skip=true \
            -B \
            package
          mvn -pl crawler/fs -Pstandard \
            -Dmaven.compiler.skip=true \
            -Dmaven.test.skip=true \
            -Dmaven.javadoc.skip=true \
            -Dgpg.skip=true \
            -B \
            package

      #--- Step ------------------------------------------------------------------

      - name: Publish snapshot zips to GitHub Releases
        if: >
          success() && github.event_name == 'push' && github.ref ==
          'refs/heads/main' && endsWith(steps.get_version.outputs.version,
          '-SNAPSHOT')
        run: |
          SNAP_TAG="snapshot-$(date -u '+%Y%m%d-%H%M%S')"
          gh release create "$SNAP_TAG" \
            --title "Snapshot (${{ steps.get_version.outputs.version }}, $(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes "Development snapshot. Only the 3 most recent builds are retained." \
            --prerelease \
            crawler/web/target/nx-crawler-web-*-full.zip \
            crawler/web/target/nx-crawler-web-*-standard.zip \
            crawler/fs/target/nx-crawler-fs-*-full.zip \
            crawler/fs/target/nx-crawler-fs-*-standard.zip
          # Delete snapshot releases beyond the 3 most recent
          gh release list --limit 100 \
            --json tagName,createdAt \
            --jq '[.[] | select(.tagName | startswith("snapshot-"))] | sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | xargs -r -I {} gh release delete {} --yes --cleanup-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      #--- Step ------------------------------------------------------------------

      - name: Publish release zips to GitHub Releases
        if: >
          success() && github.event_name == 'push' && startsWith(github.ref,
          'refs/heads/release/') && !endsWith(steps.get_version.outputs.version,
          '-SNAPSHOT')
        run: |
          # The git tag was created by "Tag release version". Create the GitHub
          # Release for it (or upload to it if pre-created manually).
          gh release create "v${{ steps.get_version.outputs.version }}" \
            --title "Release ${{ steps.get_version.outputs.version }}" \
            --generate-notes \
            crawler/web/target/nx-crawler-web-*-full.zip \
            crawler/web/target/nx-crawler-web-*-standard.zip \
            crawler/fs/target/nx-crawler-fs-*-full.zip \
            crawler/fs/target/nx-crawler-fs-*-standard.zip 2>/dev/null || \
          gh release upload "v${{ steps.get_version.outputs.version }}" \
            crawler/web/target/nx-crawler-web-*-full.zip \
            crawler/web/target/nx-crawler-web-*-standard.zip \
            crawler/fs/target/nx-crawler-fs-*-full.zip \
            crawler/fs/target/nx-crawler-fs-*-standard.zip \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      #--- Step ------------------------------------------------------------------

      # After a successful release, bump all POMs to the next patch SNAPSHOT
      # (e.g. 4.0.0 → 4.0.1-SNAPSHOT) so that subsequent commits on the
      # release branch don't accidentally re-trigger a Maven Central deploy.
      # Uses RELEASE_PAT so the commit re-triggers the CI/CD workflow for a
      # snapshot build/deploy of the new version.
      - name: Bump to next patch SNAPSHOT after release
        if: >
          success() && github.event_name == 'push' && startsWith(github.ref,
          'refs/heads/release/') && !endsWith(steps.get_version.outputs.version,
          '-SNAPSHOT')
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_SNAPSHOT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          mvn versions:set \
            -DnewVersion="$NEXT_SNAPSHOT" \
            -DgenerateBackupPoms=false \
            -B
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): bump to next development version ${NEXT_SNAPSHOT}"
          git push
        env:
          # PAT required so this commit triggers CI for the new SNAPSHOT version.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

