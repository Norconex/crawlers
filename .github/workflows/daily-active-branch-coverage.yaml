name: Daily Active Branch Coverage

on:
    schedule:
        - cron: "25 6 * * *"
    workflow_dispatch:

permissions:
    actions: read
    contents: read

jobs:
    discover-branches:
        runs-on: ubuntu-latest
        outputs:
            branches: ${{ steps.collect.outputs.branches }}
            since: ${{ steps.previous-run.outputs.since }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Find previous successful scheduled run
              id: previous-run
              uses: actions/github-script@v7
              with:
                  script: |
                      const workflow_id = 'daily-active-branch-coverage.yaml';
                      const response = await github.rest.actions.listWorkflowRuns({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        workflow_id,
                        event: 'schedule',
                        status: 'completed',
                        per_page: 20,
                      });

                      const successful = response.data.workflow_runs
                        .filter(run => run.conclusion === 'success')
                        .sort((a, b) => new Date(b.run_started_at ?? b.created_at) - new Date(a.run_started_at ?? a.created_at));

                      const fallback = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
                      const since = successful.length > 0
                        ? (successful[0].run_started_at ?? successful[0].created_at)
                        : fallback;

                      core.setOutput('since', since);

            - name: Collect branches updated since previous run
              id: collect
              shell: bash
              run: |
                  git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'

                  SINCE='${{ steps.previous-run.outputs.since }}'
                  SINCE_EPOCH="$(date -d "$SINCE" +%s)"
                  mapfile -t BRANCHES < <(
                    git for-each-ref refs/remotes/origin \
                      --format='%(refname:short)|%(committerdate:iso-strict)' |
                    sed 's#^origin/##' |
                    while IFS='|' read -r branch date; do
                      case "$branch" in
                        HEAD|main)
                          continue
                          ;;
                      esac

                      BRANCH_EPOCH="$(date -d "$date" +%s)"
                      if (( BRANCH_EPOCH > SINCE_EPOCH )); then
                        printf '%s\n' "$branch"
                      fi
                    done | sort -u
                  )

                  if [[ ${#BRANCHES[@]} -eq 0 ]]; then
                    echo 'branches=[]' >> "$GITHUB_OUTPUT"
                    echo "No active branches updated since $SINCE"
                  else
                    printf 'branches=%s\n' "$(printf '%s\n' "${BRANCHES[@]}" | jq -R . | jq -cs .)" >> "$GITHUB_OUTPUT"
                    echo "Active branches: ${BRANCHES[*]}"
                  fi

    coverage:
        needs: discover-branches
        if: ${{ needs.discover-branches.outputs.branches != '[]' }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                branch: ${{ fromJson(needs.discover-branches.outputs.branches) }}

        steps:
            - name: Checkout branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ matrix.branch }}
                  fetch-depth: 0

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: maven

            - name: Install recent Maven
              run: |
                  MAVEN_VERSION=3.9.10
                  if [ ! -d "/opt/maven/apache-maven-$MAVEN_VERSION" ]; then
                    wget https://downloads.apache.org/maven/maven-3/$MAVEN_VERSION/binaries/apache-maven-$MAVEN_VERSION-bin.tar.gz
                    tar xzvf apache-maven-$MAVEN_VERSION-bin.tar.gz
                    sudo mkdir -p /opt/maven
                    sudo mv apache-maven-$MAVEN_VERSION /opt/maven/
                    rm apache-maven-$MAVEN_VERSION-bin.tar.gz
                  fi
                  sudo rm -f /usr/bin/mvn
                  sudo ln -sf /opt/maven/apache-maven-$MAVEN_VERSION/bin/mvn /usr/bin/mvn

            - name: Run full coverage suite
              run: |
                  mvn clean test -Pjacoco \
                    -DexcludedGroups= \
                    -Dmaven.compiler.maxmem=3072m \
                    -DargLine="-Xmx3g" \
                    -Dmaven.javadoc.skip=true \
                    -Dmaven.wagon.rss.buffer.size=2048 \
                    -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
                    -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
                    -C \
                    -B

            - name: Sanitize artifact name
              id: artifact
              shell: bash
              run: |
                  echo "name=jacoco-${MATRIX_BRANCH//\//-}" >> "$GITHUB_OUTPUT"
              env:
                  MATRIX_BRANCH: ${{ matrix.branch }}

            - name: Upload JaCoCo reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.artifact.outputs.name }}
                  path: |
                      **/target/site/jacoco/**
                      **/target/jacoco.exec
                  if-no-files-found: warn
