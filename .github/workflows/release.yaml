# Bumps the project version on a release/* branch and pushes the commit,
# which triggers the main CI/CD workflow to deploy to Maven Central and
# publish distribution zips.
#
# PREREQUISITES
# =============
# A Personal Access Token (PAT) with "Contents: write" permission must be
# stored as the repository secret RELEASE_PAT.
# Using a PAT (instead of GITHUB_TOKEN) is required so that the version-bump
# commit pushed here re-triggers the main CI/CD workflow — GitHub does not
# re-trigger workflows for commits made with GITHUB_TOKEN.
#
# HOW TO USE
# ==========
# 1. Create a release/* branch from main (e.g. release/4.0.x).
#    The branch may stay at X.Y.Z-SNAPSHOT for stabilization work.
# 2. Create a CHANGELOG file with the version in its name on the release branch
#    (e.g., changelogs/changelog-4.0.0.md). This file must exist and have content.
#    Use changelogs/TEMPLATE.md as a guide.
#    This prevents accidental reuse of old changelogs.
# 3. When ready to release, go to:
#      Actions → "Release" → "Run workflow"
#    Select the release/* branch and enter the target version (e.g. 4.0.0).
# 4. This workflow validates the changelog exists, sets the version in all POMs, and pushes.
# 5. The CI/CD workflow detects the non-SNAPSHOT version and fires:
#    Maven Central deploy → git tag → zip packaging → GitHub Release.
#    The changelog is preserved in git history at that tag.
# 6. AFTER successful release: Delete changelogs/changelog-X.Y.Z.md from the release
#    branch before merging back to main. This keeps main clean and prevents duplication.
#    See changelogs/README.md for details.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 4.0.0) — must not contain SNAPSHOT"
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      source_branch: ${{ github.ref_name }}
      source_ref: ${{ github.ref }}
      source_sha: ${{ steps.push_release_commit.outputs.sha }}

    steps:
      #--- Step ------------------------------------------------------------------

      - name: Validate branch is release/*
        run: |
          if [[ ! "$GITHUB_REF" =~ ^refs/heads/release/ ]]; then
            echo "ERROR: This workflow must be run on a release/* branch."
            echo "Current ref: $GITHUB_REF"
            echo "Select a release/* branch from the 'Run workflow' dropdown."
            exit 1
          fi

      #--- Step ------------------------------------------------------------------

      - name: Validate version input has no SNAPSHOT
        run: |
          if [[ "${{ inputs.version }}" == *SNAPSHOT* ]]; then
            echo "ERROR: Version '${{ inputs.version }}' must not contain SNAPSHOT."
            exit 1
          fi

      #--- Step ------------------------------------------------------------------

      - name: Validate version major matches branch major
        run: |
          # Branch name after release/ may be e.g. "4.x" or "4.0.x" — extract
          # the leading integer as the branch major.
          BRANCH_SEGMENT="${GITHUB_REF#refs/heads/release/}"
          BRANCH_MAJOR=$(echo "$BRANCH_SEGMENT" | cut -d. -f1)
          INPUT_MAJOR=$(echo "${{ inputs.version }}" | cut -d. -f1)
          if [[ "$INPUT_MAJOR" != "$BRANCH_MAJOR" ]]; then
            echo "ERROR: Version '${{ inputs.version }}' (major: ${INPUT_MAJOR}) does not match branch '${BRANCH_SEGMENT}' (major: ${BRANCH_MAJOR})."
            exit 1
          fi

      #--- Step ------------------------------------------------------------------

      # Token must be a PAT so the pushed commit triggers the CI/CD workflow.
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      #--- Step ------------------------------------------------------------------

      - name: Set up JDK 21 and Maven
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      #--- Step ------------------------------------------------------------------

      - name: Validate current POM is SNAPSHOT
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$CURRENT" != *-SNAPSHOT ]]; then
            echo "ERROR: Current POM version '$CURRENT' is not a SNAPSHOT."
            echo "This branch may have already been released."
            exit 1
          fi
          echo "Current version: $CURRENT → releasing as: ${{ inputs.version }}"

      #--- Step ------------------------------------------------------------------

      - name: Validate changelog file exists and has content
        run: |
          CHANGELOG_FILE="changelogs/changelog-${{ inputs.version }}.md"
          if [[ ! -f "$CHANGELOG_FILE" ]]; then
            echo "ERROR: Changelog file not found: $CHANGELOG_FILE"
            echo "You must create a changelog file with the version in its name to prevent reuse."
            echo "Example: changelogs/changelog-${{ inputs.version }}.md"
            exit 1
          fi
          # Verify the file has content (more than just whitespace/header)
          if ! grep -q '[a-zA-Z0-9]' "$CHANGELOG_FILE"; then
            echo "ERROR: Changelog file is empty or contains only whitespace."
            echo "File: $CHANGELOG_FILE"
            echo "Add meaningful release notes."
            exit 1
          fi
          echo "✓ Changelog found and validated: $CHANGELOG_FILE"

      #--- Step ------------------------------------------------------------------

      - name: Set release version in all POMs
        run: |
          mvn versions:set \
            -DnewVersion=${{ inputs.version }} \
            -DgenerateBackupPoms=false \
            -B

      #--- Step ------------------------------------------------------------------

      - name: Commit and push version bump
        id: push_release_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): set version to ${{ inputs.version }}"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # Notify the private site repository so it can clone the version-bumped
  # public sources, regenerate docs, build Javadoc, and publish the site.
  notify-website-release:
    needs: prepare
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      TARGET_REPOSITORY: Norconex/crawlers-website

    steps:
      - name: Validate dispatch secret
        env:
          DISPATCH_TOKEN: ${{ secrets.CRAWLERS_WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "Missing required secret: CRAWLERS_WEBSITE_DISPATCH_TOKEN"
            exit 1
          fi

      - name: Trigger private website release build
        env:
          DISPATCH_TOKEN: ${{ secrets.CRAWLERS_WEBSITE_DISPATCH_TOKEN }}
          SOURCE_BRANCH: ${{ needs.prepare.outputs.source_branch }}
          SOURCE_REF: ${{ needs.prepare.outputs.source_ref }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$TARGET_REPOSITORY/dispatches" \
            -d @- <<EOF
          {
            "event_type": "public-release-prepared",
            "client_payload": {
              "source_repository": "${{ github.repository }}",
              "source_branch": "$SOURCE_BRANCH",
              "source_ref": "$SOURCE_REF",
              "source_sha": "$SOURCE_SHA",
              "release_version": "$RELEASE_VERSION",
              "site_docs_dir": "docs/site",
              "reference_source_dir": "docs/reference-source"
            }
          }
          EOF
