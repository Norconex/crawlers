# Nightly Test Suite
# Runs slow tests (tagged @SlowTest / "slow" JUnit tag) every night at 2 AM UTC.
# Slow tests are excluded from the main CI workflow (maven-ci-cd.yaml) by default
# via <surefire.excludedGroups>slow</surefire.excludedGroups> in the parent POM.
# This workflow overrides that exclusion to run the full suite, including slow tests.

name: Nightly Tests

on:
  # Run every night at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  nightly-slow-tests:
    name: Slow Test Suite (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2-hour timeout for comprehensive tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolve Maven Dependencies
        run: |
          mvn dependency:go-offline -U \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Run Slow Tests
        # Override the default surefire.excludedGroups=slow from the parent POM
        # so that tests tagged @SlowTest are included.
        run: |
          mvn -B test \
            -Dsurefire.excludedGroups= \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -C

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-test-results
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 30
