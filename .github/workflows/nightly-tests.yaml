# Nightly Integration Test Suite
# Runs integration tests (*IT.java) every night at 2 AM UTC via Maven Failsafe.
# Integration tests are skipped during regular builds (mvn test) because Failsafe
# only runs during the verify phase. Use "mvn verify" to run them locally.

name: Nightly Tests

on:
  # Run every night at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  nightly-integration-tests:
    name: Integration Test Suite (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2-hour timeout for comprehensive tests

    permissions:
      # write required for dependency submission
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolve Maven Dependencies
        run: |
          mvn dependency:go-offline -U \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Run Integration Tests
        run: |
          mvn -B verify \
            -Dgpg.skip=true \
            -Dmaven.wagon.rss.buffer.size=2048 \
            -Dlog4j.configurationFile=${{ github.workspace }}/.github/log4j2-ci.xml \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -C

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-test-results
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 30

      # Uploads the resolved dependency graph (including transitives) to
      # GitHub so Dependabot can alert on vulnerable transitive dependencies.
      # Runs nightly rather than on every push to main to keep the CI/CD
      # critical path lean.
      - name: Update Maven dependency graph
        if: github.repository == 'Norconex/crawler'
        uses: advanced-security/maven-dependency-submission-action@v5
