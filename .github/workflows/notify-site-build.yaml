name: Notify Private Site Build

on:
    push:
        branches:
            - main
        paths:
            - "docs/site/**"
            - "docs/reference-source/**"
    workflow_dispatch:

jobs:
    dispatch:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        env:
            DISPATCH_SECRET_NAME: CRAWLERS_WEBSITE_DISPATCH_TOKEN
            TARGET_REPOSITORY: Norconex/crawlers-website

        steps:
            - name: Validate dispatch secret
              env:
                  DISPATCH_TOKEN: ${{ secrets[env.DISPATCH_SECRET_NAME] }}
              run: |
                  if [ -z "$DISPATCH_TOKEN" ]; then
                    echo "Missing required secret: CRAWLERS_WEBSITE_DISPATCH_TOKEN"
                    exit 1
                  fi

            - name: Trigger private website build
              env:
                  DISPATCH_TOKEN: ${{ secrets[env.DISPATCH_SECRET_NAME] }}
              run: |
                  curl -L \
                    -X POST \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer $DISPATCH_TOKEN" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "https://api.github.com/repos/$TARGET_REPOSITORY/dispatches" \
                    -d @- <<EOF
                  {
                    "event_type": "public-docs-updated",
                    "client_payload": {
                      "source_repository": "${{ github.repository }}",
                      "source_branch": "${{ github.ref_name }}",
                      "source_ref": "${{ github.ref }}",
                      "source_sha": "${{ github.sha }}",
                      "site_docs_dir": "docs/site",
                      "reference_source_dir": "docs/reference-source",
                      "changes_type": "docs-only"
                    }
                  }
                  EOF
